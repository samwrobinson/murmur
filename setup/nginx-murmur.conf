# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/murmur/murmur.crt;
    ssl_certificate_key /etc/ssl/murmur/murmur.key;

    # Serve the pre-built 11ty static site
    root /home/murmur/murmur/public;
    index index.html;

    # Proxy API requests to Flask
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Allow audio uploads up to 50MB
        client_max_body_size 50m;
    }

    # Static files — cache for performance
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-style fallback for page routes
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
